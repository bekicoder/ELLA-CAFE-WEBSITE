<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="/public/css/account.css">
</head>
<body class="flex items-center py-5">
  <h1 class="text-center bg-gray-200 text-3xl my-0 font-bold"></h1>
  <div class="form_container flex flex-col px-8 gap-2 max-w-xl mx-auto sm:border rounded-lg pt-2 bg-gradient-to-br from-blue-50/20 to-indigo-100/20 pb-8 h-175 pb-7">
  <div class="flex bg-amber-00 justify-center font-medium text-[18px] items-center relative gap-16 py-4 border-b border-b-gray-300 mb-3">

    <!--buttons container-->
  <button type="button" class="signUp_btn" class="text-blue-600">
       Sign Up 
     </button>
   <button type="button" class="signIn_btn">
     Sign in
     </button>

   <!--active line-->
   <div id="active_line" class="w-30 h-0.5 bg-blue-600 text-5xl absolute bottom-2  transition duration-200 translate-x-[-50%] "></div>
  </div>  
  
<form class="signUp_form flex flex-col gap-2">
      <div class="flex w-full gap-5  justify-center">
      <div class="flex flex-col bg-amber-00 w-[50%] ">
        <label for="fname" class="m-1 text-gray-700 font-medium">Frist Name</label>
        <input id="fname" type="text" class="border border-gray-400  px-2 py-2.5 w-full rounded-lg placeholder:text-gray-500" placeholder="John" name="fname" required>
      </div>
      <div class="flex flex-col bg-amber-00 w-[50%] ">
        <label for="laname" class="m-1 text-gray-700 font-medium">
          Last Name
        </label>
      <input id="laname"type="text" class="border border-gray-400  px-2 py-2.5 w-full rounded-lg flex-1 placeholder:text-gray-500" placeholder="Doe" name="lname" required>
      </div>
    </div>
    
    <div class="flex flex-col bg-amber-00 w-full relative">
        <label for="laname" class="m-1 text-gray-700 font-medium">
          Phone Number
        </label>
        <i class="fas fa-phone text-gray-400 absolute bottom-4 ml-2"></i>
      <input type="number" name="phone_number" class="border border-gray-400  px-2 py-2.5 w-full rounded-lg flex-1 pl-10 placeholder:text-gray-500" placeholder="+251 ••••••••" required>
      </div>
    <div class="flex flex-col bg-amber-00 w-full relative">
        <label for="laname" class="m-1 text-gray-700 font-medium">
          Email
        </label>
        <i class="fas fa-envelope text-gray-400 absolute bottom-4 ml-2"></i>
      <input type="email" class="placeholder:text-gray-500 border border-gray-400  px-2 py-2.5 w-full rounded-lg flex-1 pl-10" placeholder="you@example.com" name="email" required>
      </div>
    <div class="flex flex-col bg-amber-00 w-full relative">
        <label for="laname" class="m-1 text-gray-700 font-medium">
          Password
        </label>
        
        <i class="fas fa-lock text-gray-400 absolute bottom-4 ml-2"></i>
        <button type="button" class="fas fa-eye-slash togglepassword text-gray-400 hover:text-gray-600 absolute bottom-0 right-0  p-4"></button>
      <input type="password" type="text" class="placeholder:text-gray-500 border border-gray-400  px-2 py-2.5 w-full rounded-lg flex-1 px-10" placeholder="••••••••" name="password" required>
      </div>
    <div class="flex flex-col bg-amber-00 w-full relative">
        <label for="laname" class="m-1 text-gray-700 font-medium">
          Confirm Password
        </label>
        
        <i class="fas fa-lock text-gray-400 absolute bottom-4 ml-2"></i>
        <button type="button" class="fas fa-eye-slash togglepassword text-gray-400 hover:text-gray-600 absolute bottom-0 right-0 p-4"></button>
      <input type="password" type="text" class="placeholder:text-gray-500 border border-gray-400  px-2 py-2.5 w-full rounded-lg flex-1 px-10" placeholder="••••••••" name="coPassword" required>
      
      </div>
      <div>
      <p class="confirm_alert  -translate-y-[50%] origin-center  mt-2">Allready have an account? Sign In</p>
    <button type="submit" id="signUpBtn" class="py-2 w-full bg-blue-600  text-white rounded-lg">Sign Up</button>  
        
      </div>
</form>

<form class="signIn_form h-full flex-1 hidden h-full flex flex-col">
  <div class="flex flex-col bg-amber-00 w-full relative">
        <label for="laname" class="m-1 text-gray-700 font-medium">
          Email
        </label>
        <i class="fas fa-envelope text-gray-400 absolute bottom-4 ml-2"></i>
      <input type="email" id="laname"type="text" class="border border-gray-400  px-2 py-2.5 w-full rounded-lg flex-1 pl-10" placeholder="you@example.com" name="email">
      </div>
      <div class="flex flex-col bg-amber-00 w-full relative">
        <label for="laname" class="m-1 text-gray-700 font-medium">
          Password
        </label>
        
        <i class="fas fa-lock text-gray-400 absolute bottom-4 ml-2"></i>
        <button type="button" class="fas fa-eye-slash togglepassword text-gray-400 hover:text-gray-600 absolute bottom-4 right-0 mr-2"></button>
      <input type="password" id="laname" class="border border-gray-400  px-2 py-2.5 w-full rounded-lg flex-1 px-10" placeholder="••••••••" name="password">
      </div>
      <p class="confirm_alert  -translate-y-[50%] origin-center  mt-4">If you don't have an accou nt? Sign Up</p>
     <button id="signInBtn" class="py-2 w-full bg-blue-600 mt-4 text-white rounded-lg mt-auto">Sign In</button> 
</form>

  <div class="w-full bg-amber-60 flex flex-col items-center gap-4 text-center ">
    <div class="w-full border-b border-b-gray-400 py-2 text-gray-500">
      Or Sign Up with Google
    </div>
  <button id="google_btn"class="w-13 text-xl aspect-square bg-white rounded-full flex-none block border border-gray-300">
    <i class="fab fa-google text-red-500"></i>
  </button>  
  </div>
  </div>
  
  
<script src="/js/account.js"></script>
</body>
</html>
